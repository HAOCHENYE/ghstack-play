name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created, opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: /review
          claude_args: |
              --max-turns 30
              --model claude-opus-4-6
              --allowedTools "
                Read,Write,Edit,MultiEdit,LS,Grep,Glob,
                Bash(cat:*),Bash(test:*),Bash(printf:*),Bash(jq:*),Bash(head:*),Bash(git:*),Bash(gh:*),
                mcp__github_inline_comment__create_inline_comment,
                "
          settings: |
            {
              "env": {
                "DEBUG": "true"
              }
            }
          allowed_non_write_users: "*"
          track_progress: false

  claude-comment:
    if: |
      contains(github.event.comment.body, '@claude') &&
      !contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
              REPO: ${{ github.repository }}
              PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

              COMMENT_USER: ${{ github.event.comment.user.login }}
              COMMENT_CONTENT: ${{ github.event.comment.body }}

              Please anser the user's question. If you need to get the PR content, use can
              use `gh pr view <PR NUMBER> --comments` and `gh pr diff <PR NUMBER> --patch` to access the PR content.
              You can use multiple subagents to parallelize tasks. Each subagent should be told the PR title and
              description.

              Use `gh pr comment ${{ github.event.pull_request.number }} --body "..."` to summarize the result.

          claude_args: |
              --max-turns 30
              --model claude-opus-4-6
              --allowedTools "
                Read,Write,Edit,MultiEdit,LS,Grep,Glob,
                Bash(cat:*),Bash(test:*),Bash(printf:*),Bash(jq:*),Bash(head:*),Bash(git:*),Bash(gh:*),
                mcp__github_inline_comment__create_inline_comment,
                "
          settings: |
            {
              "env": {
                "DEBUG": "true"
              }
            }
          allowed_non_write_users: "*"
          track_progress: false
